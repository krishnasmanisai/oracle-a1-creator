name: Oracle A1.Flex Instance Creator

on:
  schedule:
    # Run every 10 minutes (conservative to stay within free tier limits)
    # Free tier: 2,000 minutes/month. 
    # ~144 runs/day × 30 days = 4,320 runs/month
    # Each run is ~5-10 seconds on failure = ~360-720 min/month total
    # Adjust to '*/5 * * * *' if you want more aggressive polling
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCI SDK
        run: pip install oci requests

      - name: Run A1.Flex creator
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: python github_actions_oracle_a1.py
        continue-on-error: true

      - name: Check result
        if: failure()
        run: |
          echo "Instance creation failed. Will retry in next scheduled run (5 minutes)."
